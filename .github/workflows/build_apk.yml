name: Build TOJONIRINA APK

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          flet build apk --no-analytics

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOJONIRINA-app-release
          path: build/apk/*.apk
