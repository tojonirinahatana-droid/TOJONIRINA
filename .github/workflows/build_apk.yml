name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        # Cette commande construit l'APK. 
        # Assurez-vous d'avoir un fichier main.py à la racine.
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mon-apk-application
          # Flet génère généralement l'APK dans ce dossier
          path: build/apk/app-release.apk
