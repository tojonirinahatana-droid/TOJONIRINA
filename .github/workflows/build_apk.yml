name: Build Flet APK

on:
  push:
name: Build TOJONIRINA APK

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          flet build apk --no-analytics

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOJONIRINA-app-release
          path: build/apk/*.apk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Ity no zava-dehibe: manomana ny tontolo iainana Android/Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Build APK
        # Manampy ny fananganana ny fitaovana ilaina
        run: |
          flet build apk --name "TOJONIRINA" --project-id "com.tojonirina.app" --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TOJONIRINA-APK
          path: build/apk/app-release.apk
