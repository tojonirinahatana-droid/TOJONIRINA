name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installation des dépendances système nécessaires pour Android
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify-dev libgconf-2-4

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Build APK
        # On ajoute --verbose pour voir plus de détails dans les logs en cas d'erreur
        run: flet build apk --name "TOJONIRINA" --project-id "com.tojonirina.app" --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TOJONIRINA-APK
          path: build/apk/app-release.apk
